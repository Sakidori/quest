<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">  <title>Summer Quest</title>
  <style>
    :root {
      color-scheme: dark;
    }
html, body {
    margin: 0;
    padding: 0;
    width: 100vw;
    height: 100dvh;
    overflow: hidden;
    background: #1a2f4d;
}

#game-shell {
    position: relative;
    width: 100vw;
    height: 100dvh;
    display: flex;       /* Keep this to center the canvas */
    justify-content: center;
    align-items: center;
}

#overlay, #goalPopup {
    display: none;
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.7); /* Dim the game underneath */
    justify-content: center;
    align-items: center;
    z-index: 100;
}

/* The rounded, stylized box */
.panel {
    background: #2c3e50; /* Dark blue/grey background */
    color: white;
    padding: 30px;
    border-radius: 20px; /* Rounded corners */
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5); /* Soft shadow */
    border: 2px solid #34495e;
    max-width: 80%;
}

/* Consistent button style for all popups */
button {
    padding: 12px 25px;
    margin: 10px;
    background: #e67e22; /* Vibrant orange */
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 18px;
    cursor: pointer;
    transition: background 0.2s;
}

button:hover {
    background: #d35400;
}

canvas {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: contain;
    aspect-ratio: 16 / 9;
}

#controls {
    display: none;
    position: absolute; 
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none; /* Let touches pass through to the game */
    z-index: 20;          /* Ensure they are on top of the canvas */
    justify-content: space-between; /* Pushes left/right groups to the edges */
    align-items: flex-end;          /* Pushes them to the bottom */
}

@media (max-width: 900px) {
    #controls {
        display: block; /* Show the container */
    }
}
.left-controls {
    position: absolute;
    left: 10px;
    bottom: 20px;
    display: flex;
    gap: 10px;
    pointer-events: auto; /* Buttons need to be clickable */
}

.right-controls {
    position: absolute;
    right: 10px;
    bottom: 20px;
    display: flex;
    gap: 10px;
    pointer-events: auto;
}

.control-btn {
    width: 50px; /* Adjusted slightly for mobile comfort */
    height: 50px;
    background: rgba(255, 255, 255, 0.2);
    border: 2px solid rgba(255, 255, 255, 0.4);
    border-radius: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    font-family: Segoe UI;    /* Change to 'Arial', 'Courier', etc. */
    color: white;
    user-select: none;
    touch-action: none;
}
/* Only show them if the screen is narrow (Mobile/Tablet) */
#orientation-gate {
    display: none; /* Default hidden */
    position: fixed;
    top: 0; left: 0; width: 100vw; height: 100vh;
    background: #000;
    z-index: 10000;
    justify-content: center;
    align-items: center;
}

/* Only show on phones in Portrait mode */
@media (max-width: 900px) and (orientation: portrait) {
    #orientation-gate {
        display: flex;
    }
}

html, body {
    touch-action: manipulation; /* Prevents double-tap to zoom */
    overflow: hidden;           /* Stops page scrolling/bouncing */
}
  </style>
</head>
<body>
  <div id="game-shell">
    <canvas id="gameCanvas"></canvas>

     <div id="overlay">
      <div class="panel">
        <h1>Super Summer Quest</h1>
        <p>Complete the level.</p>
        <button id="startButton">Start Game</button>
        <div class="hint">Controls: Arrow keys or A/D to move, Space/Up/W to jump.</div>
      </div>
    </div>

<div id="goalPopup">
    <div class="panel">
        <h2>Level Complete!</h2>
        <p>秘密の言葉を入れてください:</p>
        <input type="text" id="passwordInput" placeholder="Type here..." style="padding: 10px; border-radius: 5px; border: none; font-size: 16px;">
        <br><br>
        <button onclick="checkWord()">Submit</button>
        <button onclick="restartGame()">Restart</button>
        <p id="errorMessage" style="color:#ff7675; margin-top: 10px; font-weight: bold;"></p>
    </div>
</div>

    <!-- Controls MUST be inside game-shell to follow its scaling -->
    <div id="controls">
        <div id="dpad" class="left-controls">
            <div id="btn-left" class="control-btn">◀</div>
            <div id="btn-right" class="control-btn">▶</div>
        </div>
        <div id="action-buttons" class="right-controls">
            <div id="btn-jump" class="control-btn">▲</div>
            <div id="btn-attack" class="control-btn">X</div>
        </div>
    </div>
</div>
   

  <div id="orientation-gate">
    <p>端末を横向きにしてください！</p>
</div>

<!-- Virtual Controls -->
<div id="controls">
    <div id="dpad" class="left-controls">
        <div id="btn-left" class="control-btn">◀</div>
        <div id="btn-right" class="control-btn">▶</div>
    </div>
    <div id="action-buttons" class="right-controls">
        <div id="btn-jump" class="control-btn">▲</div>
        <div id="btn-attack" class="control-btn">X</div>
    </div>
</div>

  <script>
window.addEventListener("orientationchange", () => {
    setTimeout(() => {
        window.scrollTo(0, 0);
        resizeCanvas();
    }, 200);
});

// For browsers that don't support orientationchange well
window.addEventListener("resize", () => {
    const GAME_WIDTH = 800;
const GAME_HEIGHT = 450;

function setupCanvas() {
    const canvas = document.getElementById("gameCanvas");
    canvas.width = GAME_WIDTH;
    canvas.height = GAME_HEIGHT;
}

// Call this once on startup
setupCanvas();
});
const VIRTUAL_WIDTH = 800;
const VIRTUAL_HEIGHT = 450;

function resizeCanvas() {
    const canvas = document.getElementById("gameCanvas");
    // Ensure the canvas internal resolution is always 800x450
    canvas.width = VIRTUAL_WIDTH;
    canvas.height = VIRTUAL_HEIGHT;
}

// Single source of truth for initialization
window.addEventListener('load', () => {
    resizeCanvas();
});

// Orientation change fix
window.addEventListener("orientationchange", () => {
    setTimeout(resizeCanvas, 300);
});

    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const overlay = document.getElementById("overlay");
    const startButton = document.getElementById("startButton");
    const panelTitle = overlay.querySelector("h1");
    const panelText = overlay.querySelector("p");
    const panelHint = overlay.querySelector(".hint");
    
    const spriteFiles = {
      idle: "male_hero-idle.png",
      run: "male_hero-run.png",
      jump: "male_hero-jump.png",
      fall: "male_hero-fall.png",
      walk: "male_hero-walk.png",
      attack: "male_hero-combo_1.png",
      attack_end: "male_hero-combo_1_end.png",
      booger: "Booger Buddy.png"
    };

    const sprites = {};
    const goalImage = new Image();
    let loadedAssets = 0;
    const totalAssets = Object.keys(spriteFiles).length + 1;

const BOOGER_SIZE = 32;
const BOOGER_ANIM = {
    moveRight: { row: 5, frames: 4 },
    moveLeft:  { row: 6, frames: 4 },
    hitRight:  { row: 13, frames: 2 },
    hitLeft:   { row: 15, frames: 2 },
    dying:     { row: 21, frames: 5 }
};

    function assetLoaded() {
      loadedAssets += 1;
      if (loadedAssets >= totalAssets) {
        startGame();
      }
    }

    Object.entries(spriteFiles).forEach(([key, src]) => {
      const img = new Image();
      img.onload = assetLoaded;
      img.onerror = assetLoaded;
      img.src = src;
      sprites[key] = img;
    });

    goalImage.onload = assetLoaded;
    goalImage.onerror = assetLoaded;
    goalImage.src = "goal_flag.png";

    const GRAVITY = 0.6;
    const MOVE_SPEED = 4.8;
    const JUMP_FORCE = -12.4;
    const FRICTION = 0.8;
    const WORLD_WIDTH = 1600; // Total width of your new long level
    let camera = { x: 0 };

    let player;
    let platforms;
    let goal;
    let mobs;
    let floatingTexts = [];
    let keys = {};
    let animationFrameId = null;
    let running = false;
    let lastTime = 0;
    let frameIndex = 0;
    let flagTimer = 0;
    let letterPool = ["s", "u", "m", "m", "e", "r"];
    let collectedLetters = [];
    let lives = 3;
const FLAG_FRAME_DURATION = 150; // Milliseconds per frame

    function resetGame() {
        lives = 3;
        letterPool = ["s", "u", "m", "m", "e", "r"]; 
        collectedLetters = [];
      player = {
        x: 0,
        y: 15,
        w: 108,
        h: 135,
        hitboxW: 25,
        hitboxH: 100, // Physics hitbox is smaller than sprite
        yOffset: 17,  // Visual correction to shift sprite down
        dx: 0,
        dy: 0,
        onGround: false,
        facing: 1,
        alive: true,
        playerFrameIndex: 0,
        isAttacking: false,
        isInvulnerable: false,
        invulnerableTimer: 0
      };

platforms = [
    // The ground segments from your drawing
    { x: -1, y: 350, w: 200, h: 50 },
    { x: 300, y: 350, w: 200, h: 50 },
    { x: 600, y: 350, w: 200, h: 50 },
    { x: 950, y: 350, w: 200, h: 50 },
    
    // Floating platforms
    { x: 200, y: 220, w: 80, h: 20 },
    { x: 520, y: 220, w: 80, h: 20 },
    { x: 780, y: 180, w: 100, h: 20 },
    { x: 950, y: 100, w: 150, h: 20 },
    { x: 1300, y: 150, w: 100, h: 20 }
];
spikes = [
    { x: 450, y: 340, w: 30, h: 10 },
    { x: 750, y: 340, w: 30, h: 10 }
];

goal = {
  x: 1330, 
  y: 92, 
  w: 44, 
  h: 58,
  hitboxW: 16, 
  hitboxH: 45,
  hitboxOffsetX: 14, 
  hitboxOffsetY: 8,
  frameCount: 5,
  frameIndex: 0,
  // This is the only distance that matters
  frameWidth: 60,
  active: false
};
      keys = {};

mobs = [
  { 
    x: 350, y: 288, w: 50, h: 40, dx: 1.5, health: 3, frame: 0, facing: 1, 
    minX: 300, maxX: 500, // Restricted to the first platform
    wasHit: false, isDead: false, deathTimer: 0 
  },
  { 
    x: 650, y: 288, w: 50, h: 40, dx: -1.5, health: 3, frame: 0, facing: -1, 
    minX: 600, maxX: 800, // Restricted to the second platform
    wasHit: false, isDead: false, deathTimer: 0 
  }
];

    }

function startGame() {
    // Check if the device is likely mobile
    // It checks if the screen width is small (under 900px) AND it has touch capabilities
    const isMobile = window.innerWidth <= 900 && ('ontouchstart' in window || navigator.maxTouchPoints > 0);

    if (isMobile) {
        const elem = document.documentElement;
        if (elem.requestFullscreen) {
            elem.requestFullscreen().then(() => {
                if (screen.orientation && screen.orientation.lock) {
                    screen.orientation.lock('landscape').catch(() => {});
                }
            }).catch((err) => {
                console.log("Fullscreen failed", err);
            });
        }
    }
    
    resetGame();
    running = true;
    lastTime = performance.now();
    overlay.style.display = "none";
    if (animationFrameId) cancelAnimationFrame(animationFrameId);
    animationFrameId = requestAnimationFrame(loop);
}

    function showOverlay(title, text, hint) {
      running = false;
      
      if (animationFrameId) cancelAnimationFrame(animationFrameId);
      overlay.style.display = "flex";
      panelTitle.textContent = title;
      panelText.textContent = text;
      panelHint.textContent = hint || "操作方法:矢印キーまたはA/Dで移動、スペース//Wでジャンプ、Xで攻撃";
      startButton.textContent = title === "You Win!" ? "Play Again" : "Restart";
    }

    function finishGame(title, text) {
    if (title === "You Win!") {
        // Show the secret word popup instead of the standard overlay
        const popup = document.getElementById("goalPopup");
        popup.style.display = "flex";
        document.getElementById("passwordInput").focus();
    } else {
        // Default behavior for "Try Again"
        showOverlay(title, text);
    }
}

  function loop(time) {
    if (!running) return;
    
    // Clamp delta between 0.5 and 2.0 to prevent physics "explosions"
    let delta = (time - lastTime) / 16.67;
    delta = Math.max(0.5, Math.min(2.0, delta)); 
    
    lastTime = time;
    update(delta);
    render();
    animationFrameId = requestAnimationFrame(loop);
}

    function update(delta) {

        if (player.isInvulnerable) {
        player.invulnerableTimer -= delta;
        if (player.invulnerableTimer <= 0) {
            player.isInvulnerable = false;
            player.invulnerableTimer = 0;
        }
    }
// Inside update(delta)
const moveInput = (keys["ArrowRight"] || keys["KeyD"] ? 1 : 0) - (keys["ArrowLeft"] || keys["KeyA"] ? 1 : 0);

if (moveInput !== 0) {
  player.dx = moveInput * MOVE_SPEED; // Remove * delta here for smoother horizontal movement
  player.facing = moveInput;
} else {
  player.dx *= FRICTION; // This slows the player down gradually
}

      if ((keys["Space"] || keys["ArrowUp"] || keys["KeyW"]) && player.onGround) {
        player.dy = JUMP_FORCE;
        player.onGround = false;
      }
const MAX_FALL_SPEED = 15; 
if (player.dy > MAX_FALL_SPEED) {
    player.dy = MAX_FALL_SPEED;
}
      player.dy += GRAVITY * delta;
      player.x += player.dx * delta;
      player.y += player.dy * delta;

      let landed = false;
      const playerHitboxX = player.x + (player.w - player.hitboxW) / 2;
      
      platforms.forEach((platform) => {
        if (
          playerHitboxX < platform.x + platform.w &&
          playerHitboxX + player.hitboxW > platform.x &&
          player.y + player.hitboxH >= platform.y &&
          player.y + player.hitboxH <= platform.y + 20
        ) {
          if (player.dy >= 0) {
            player.y = platform.y - player.hitboxH;
            player.dy = 0;
            player.onGround = true;
            landed = true;
          }
        }
      });

spikes.forEach(spike => {
    if (
        player.x < spike.x + spike.w &&
        player.x + player.hitboxW > spike.x &&
        player.y + player.hitboxH > spike.y
    ) {
        lives = 0;
        finishGame("Try Again", "スパイクにぶつかってしまったね。もっと気をつけてね！");
    }
});

      if (!landed) player.onGround = false;

     const hitboxPadding = (player.w - player.hitboxW) / 2;

if (player.x + hitboxPadding < 0) {
  player.x = -hitboxPadding;
}
if (player.x + hitboxPadding + player.hitboxW > WORLD_WIDTH) {
  player.x = WORLD_WIDTH - player.hitboxW - hitboxPadding;
}
      if (player.y > 450) { 
        lives = 0;
    finishGame("Game Over", "君は深淵に落ちてしまった！");
}

mobs.forEach(mob => {
    if (mob.removed) return;

    // 1. Movement & Boundary Constraints
    if (mob.health > 0) {
        mob.x += mob.dx * delta;
        if (mob.x < mob.minX || (mob.x + mob.w) > mob.maxX) {
            mob.dx *= -1;
        }
    }

    // 2. Combat Logic (Sword)
    if (player.isAttacking) {
        const comboFrame = Math.floor(player.playerFrameIndex / 4);
        if (comboFrame >= 2 && comboFrame <= 4 && !mob.wasHit) {
            const hitBoxX = player.facing === 1 ? player.x + 40 : player.x - 40;
            if (Math.abs(mob.x - hitBoxX) < 75) {
                mob.health -= 1;
                mob.wasHit = true;
                
                // Reward Logic
                const letter = letterPool.length > 0 ? letterPool.splice(Math.floor(Math.random() * letterPool.length), 1)[0] : null;
                if (letter) {
                    collectedLetters.push(letter);
                    spawnDamageText(mob.x, mob.y - 20, letter.toUpperCase());
                } else {
                    spawnDamageText(mob.x, mob.y - 20, "!");
                }
            }
        }
    } else {
        mob.wasHit = false;
    }
const MOB_Y_OFFSET = 25;
if (!mob.isDead &&
    player.x < mob.x + mob.w &&
    player.x + player.hitboxW > mob.x &&
    player.y + player.hitboxH > (mob.y + 25) &&
    player.y < (mob.y + 25) + mob.h
) {
    // We define "Feet" as the bottom of your player
    const playerFeet = player.y + player.hitboxH;
    const mobTop = mob.y + 25; // Adjusted for your visual offset

    // STOMP: If we are falling AND our feet are above the center of the mob
    // I increased the threshold from 20 to 30 to make it easier to hit.
    if (player.dy > 0 && playerFeet < mobTop + 30) {
        mob.health -= 1;
        player.dy = -8; // Bounce off
        player.onGround = false;
        
        // Reward Logic
        const letter = letterPool.length > 0 ? letterPool.splice(Math.floor(Math.random() * letterPool.length), 1)[0] : null;
        spawnDamageText(mob.x, mob.y, letter ? letter.toUpperCase() : "!");
    } 
    // DAMAGE: Only triggers if the stomp condition was NOT met
    else if (!player.isInvulnerable) {
        lives -= 1;
        if (lives <= 0) {
            finishGame("Game Over", "You ran out of lives!");
        } else {
            player.isInvulnerable = true;
            player.invulnerableTimer = 120; // 2 seconds of invulnerability
            player.dx = (player.x < mob.x ? -1 : 1) * 8;
            player.dy = -5;
        }
    }
}

    // 4. Death Check
    if (mob.health <= 0 && !mob.isDead) {
        mob.isDead = true;
        mob.frame = 0;
    }
});

// Cleanup removed mobs
mobs = mobs.filter(m => !m.removed);

// Goal Animation Timer
flagTimer += delta; 
if (flagTimer >= 10) { // Adjust '10' based on how fast you want the animation
    goal.frameIndex = (goal.frameIndex + 1) % goal.frameCount;
    flagTimer = 0;
}

const goalHitboxX = goal.x + goal.hitboxOffsetX;
const goalHitboxY = goal.y + goal.hitboxOffsetY;

// Add the 'if (goal.active)' check here
if (goal.active) { 
    if (
      player.x < goalHitboxX + goal.hitboxW &&
      player.x + player.hitboxW > goalHitboxX &&
      player.y < goalHitboxY + goal.hitboxH &&
      player.y + player.hitboxH > goalHitboxY
    ) {
      finishGame("You Win!", "You reached the goal!");
    }
} else {
    // Optional: Check if all mobs are dead to unlock
    if (mobs.every(m => m.isDead)) {
        goal.active = true;
        spawnDamageText(goal.x, goal.y - 20, "UNLOCKED!");
    }
}
    }

   

function render() {
    // 1. Calculate camera
camera.x = Math.max(0, Math.min(player.x - VIRTUAL_WIDTH / 2, WORLD_WIDTH - VIRTUAL_WIDTH));
ctx.clearRect(0, 0, VIRTUAL_WIDTH, VIRTUAL_HEIGHT);

    // --- A. Draw Static Background (No Translation) ---
const sky = ctx.createLinearGradient(0, 0, 0, canvas.height);
sky.addColorStop(0, "#2d5a27");
sky.addColorStop(1, "#1a3317");
ctx.fillStyle = sky;
ctx.fillRect(0, 0, canvas.width, canvas.height);

// 2. Forest Layering Function
function drawForestTrees(alpha, scale, speed, yOffset) {
    ctx.save();
    ctx.globalAlpha = alpha;
    const trunkSpacing = 300 * scale; 
    
    for (let i = 0; i < WORLD_WIDTH / trunkSpacing; i++) {
        const treeX = (i * trunkSpacing) - (camera.x * speed);
        
        if (treeX > -100 && treeX < VIRTUAL_WIDTH + 100) {
            // Trunk: Increased height from 270 to 400 to reach the floor
            ctx.fillStyle = "#3d2b1f";
            ctx.fillRect(treeX + (15 * scale), 50 + yOffset, 30 * scale, 400 * scale);
            
            // Foliage: Remains at the top
            ctx.fillStyle = "#2d5a27";
            ctx.beginPath();
            ctx.arc(treeX + (30 * scale), 50 + yOffset, 45 * scale, 0, Math.PI * 2);
            ctx.arc(treeX, 80 + yOffset, 35 * scale, 0, Math.PI * 2);
            ctx.arc(treeX + (60 * scale), 80 + yOffset, 35 * scale, 0, Math.PI * 2);
            ctx.fill();

            // Highlight
            ctx.fillStyle = "#3e7a37";
            ctx.beginPath();
            ctx.arc(treeX + (30 * scale), 50 + yOffset, 25 * scale, 0, Math.PI * 2);
            ctx.fill();
        }
    }
    ctx.restore();
}

// 3. Draw layers from Back to Front
drawForestTrees(0.3, 0.6, 0.1, 50); 
drawForestTrees(0.6, 0.9, 0.3, 20); 
drawForestTrees(1.0, 1.3, 0.6, 0);  

// 4. Forest Floor
ctx.fillStyle = "#0f1f0e";
ctx.fillRect(0, canvas.height - 20, canvas.width, 20);


    // --- B. Start Camera Translation ---
    ctx.save();
    ctx.translate(-camera.x, 0);

spikes.forEach(s => {
    ctx.fillStyle = "#ff0000"; // Bright deadly red
    ctx.strokeStyle = "#8b0000"; // Dark red outline
    ctx.lineWidth = 2;

    const triWidth = s.w / 3; // Divide the area into 3 parts

    for (let i = 0; i < 3; i++) {
        const startX = s.x + (i * triWidth);
        
        ctx.beginPath();
        ctx.moveTo(startX, s.y + s.h);                 // Bottom Left
        ctx.lineTo(startX + (triWidth / 2), s.y);       // Tip
        ctx.lineTo(startX + triWidth, s.y + s.h);       // Bottom Right
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
    }
});

platforms.forEach((platform) => {
    // 1. Draw the "Trunk/Earth" base
    ctx.fillStyle = "#5d3a1a"; // Darker brown
    ctx.fillRect(platform.x, platform.y, platform.w, platform.h);

    // 2. Draw the mossy grass on top
    ctx.fillStyle = "#4a7c44"; // Forest green
    ctx.fillRect(platform.x, platform.y, platform.w, 10); 
    
    // 3. Add a highlight trim
    ctx.fillStyle = "#6b9a65"; 
    ctx.fillRect(platform.x, platform.y, platform.w, 4);
});
    // Draw Mobs
    mobs.forEach(m => {
        if (m.health >= 0) {
            m.facing = m.dx > 0 ? 1 : -1;
            drawBooger(m);
        }
    });

    
    // Draw Goal
    ctx.drawImage(goalImage, goal.frameIndex * 60, 0, 32, 50, goal.x, goal.y, goal.w, goal.h);
    if (!goal.active) {
        ctx.font = "24px Arial";
        ctx.textAlign = "center";
        ctx.fillText("🔒", goal.x + goal.w / 2, goal.y - 10);
    }

    // Draw Player
    drawPlayer();

    ctx.restore(); // --- C. End Camera Translation ---

 // --- D. Draw UI (No Translation - Pinned to Screen) ---
for (let i = floatingTexts.length - 1; i >= 0; i--) {
    let ft = floatingTexts[i];
    ft.y -= 0.5; 
    ft.timer -= 1;
    ctx.save();
    ctx.globalAlpha = ft.timer / 60;
    ctx.fillStyle = "#FFD700";
    
    // CHANGE THIS: Use a more robust font definition
    // If it's a single letter, make it big. If it's a big phrase, make it small.
    ctx.font = ft.text.length > 1 ? "bold 16px Arial, sans-serif" : "bold 30px Arial, sans-serif";
    
    ctx.textAlign = "center";
    ctx.fillText(ft.text, ft.x - camera.x, ft.y);
    ctx.restore();
    if (ft.timer <= 0) floatingTexts.splice(i, 1);
}

    ctx.fillStyle = "rgba(255,255,255,0.85)";
    ctx.font = "20px Segoe UI"; // Slightly larger font for better visibility
    ctx.textAlign = "left";
    

    // Draw "Lives: ❤️❤️❤️"
    let hearts = "";
    for (let i = 0; i < lives; i++) {
        hearts += "❤️";
    }
    ctx.fillText(`Lives: ${hearts}`, 30, 30);

}

 function drawPlayer() {
  let img = sprites.idle;
  let frame = 0;
  let frameCount = 10;
  
  const isMoving = Math.abs(player.dx) > 0.5;
  const isJumping = player.dy < -1;
  const isFalling = player.dy > 2 && !player.onGround;

  // 1. Always increment the frame counter
  player.playerFrameIndex++;

  // 2. Handle Attack Logic
  if (player.isAttacking) {
    const comboFrame = Math.floor(player.playerFrameIndex / 4); // Kept faster speed (4)
    
    if (comboFrame >= 7) {
      player.isAttacking = false;
      player.playerFrameIndex = 0; // Reset for next use
    } else {
      if (comboFrame < 3) {
        img = sprites.attack;
        frame = comboFrame;
        frameCount = 3;
      } else {
        img = sprites.attack_end;
        frame = comboFrame - 3;
        frameCount = 4;
      }
    }
  }

  // 3. Handle Movement Logic
  // We use an "else if" here so we don't accidentally draw movement 
  // frames while the attack is still playing.
  if (!player.isAttacking) {
    if (isJumping) {
      img = sprites.jump;
      frameCount = 6;
    } else if (isFalling) {
      img = sprites.fall;
      frameCount = 4;
    } else if (isMoving) {
      img = sprites.run;
      frameCount = 10;
    } else {
      img = sprites.idle;
      frameCount = 10;
    }
    frame = Math.floor(player.playerFrameIndex / 8) % frameCount;
  }

// 4. Drawing code...
if (!img || img.width === 0) return;
const frameWidth = img.width / frameCount;
const frameHeight = img.height;
const srcX = frame * frameWidth;


ctx.save();

// --- NEW FLASHING LOGIC ---
if (player.isInvulnerable) {
    // Flash every 6 frames (adjust the modulo for speed)
    if (Math.floor(player.invulnerableTimer / 6) % 2 === 0) {
        ctx.globalAlpha = 0.3; // Make character semi-transparent
    } else {
        ctx.globalAlpha = 0.85; // Slightly faded but more visible
    }
}
// --------------------------

if (player.facing < 0) {
  ctx.translate(player.x + player.w, player.y + player.yOffset);
  ctx.scale(-1, 1);
  ctx.drawImage(img, srcX, 0, frameWidth, frameHeight, 0, 0, player.w, player.h);
} else {
  ctx.drawImage(img, srcX, 0, frameWidth, frameHeight, player.x, player.y + player.yOffset, player.w, player.h);
}

ctx.restore(); // This automatically restores the globalAlpha back to 1.0
}
    function handleKeyDown(event) {
      if (event.code === "Space" || event.code === "ArrowUp" || event.code === "KeyW") {
        event.preventDefault();
      }
      keys[event.code] = true;

if (event.code === "KeyX") {
    if (!player.isAttacking) { // Prevents re-triggering while already attacking
        player.isAttacking = true;
        player.playerFrameIndex = 0;
    }
}
  
      if (event.code === "Enter" && !running) {
        startGame();
      }
    }

    function handleKeyUp(event) {
      keys[event.code] = false;
    }

    window.addEventListener("keydown", handleKeyDown);
    window.addEventListener("keyup", handleKeyUp);

    showOverlay("Summer Quest", "Use the sprites in the folder to run, jump, and reach the flag.", "Controls: Arrow keys or A/D to move, Space/Up/W to jump.");
  
function spawnDamageText(x, y, text) {

  });
}

function checkAllMobsDefeated() {
  // Returns true if every mob has health <= 0
  return mobs.every(mob => mob.health <= 0);
}

function drawBooger(mob) {
    if (mob.removed) return; 

    // 1. Determine Animation State
    let animName = "moveRight";
    if (mob.isDead) {
        animName = "dying";
    } else if (mob.wasHit) {
        animName = (mob.facing === -1) ? "hitLeft" : "hitRight";
    } else {
        animName = (mob.facing === -1) ? "moveLeft" : "moveRight";
    }

    const anim = BOOGER_ANIM[animName];
    const sy = (anim.row - 1) * BOOGER_SIZE;
    const sx = Math.floor(Math.floor(mob.frame) * BOOGER_SIZE);

    const padding = 1;
ctx.drawImage(
    sprites.booger, 
    sx, sy + padding, BOOGER_SIZE, BOOGER_SIZE - padding, 
    mob.x, mob.y, 64, 64
);
    // 3. Update logic (Handle Frame + Removal Timer)
    if (mob.isDead) {
        // Increment frame only if we haven't reached the end
        if (mob.frame < anim.frames - 1) {
            mob.frame += 0.1;
        } else {
            // Reached the end: freeze frame and increment the death timer
            mob.frame = anim.frames - 1;
            mob.deathTimer++;
            
            // Mark for removal after timer
            if (mob.deathTimer > 60) {
                mob.removed = true;
            }
        }
    } else {
        // Normal looping animation
        mob.frame = (mob.frame + 0.1) % anim.frames;
    }
}

// 1. Update your map
const btnMap = {
    "btn-left": "ArrowLeft",
    "btn-right": "ArrowRight",
    "btn-jump": "Space",
    "btn-attack": "KeyX" // Added X
};

// 2. Updated Event Logic
document.querySelectorAll('.control-btn').forEach(btn => {
    // Helper to trigger the attack
    const triggerInput = (code, state) => {
        keys[code] = state;
        // If it's the attack button being pressed, trigger the logic immediately
        if (code === "KeyX" && state === true) {
            if (!player.isAttacking) {
                player.isAttacking = true;
                player.playerFrameIndex = 0;
            }
        }
    };

    btn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        triggerInput(btnMap[btn.id], true);
    });

    btn.addEventListener('touchend', (e) => {
        e.preventDefault();
        // Don't set Attack (KeyX) to false immediately on end, 
        // as it's a "trigger" not a "hold" key
        if (btnMap[btn.id] !== "KeyX") {
            keys[btnMap[btn.id]] = false;
        }
    });

btn.addEventListener('touchcancel', (e) => {
        keys[btnMap[btn.id]] = false;
    });
});

function lockLandscape() {
    if (document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen();
        screen.orientation.lock('landscape').catch(() => {});
    }
}

function drawHitboxDebug() {
    ctx.save();
    ctx.translate(-camera.x, 0);

    // Player
    ctx.strokeStyle = 'red';
    ctx.strokeRect(player.x + (player.w - player.hitboxW)/2, player.y, player.hitboxW, player.hitboxH);

    // Mobs (Must use + 25 offset to match the collision logic above)
    ctx.strokeStyle = 'yellow';
    mobs.forEach(mob => {
        if (!mob.removed) {
            ctx.strokeRect(mob.x, mob.y + 25, mob.w, mob.h);
        }
    });

    ctx.restore();
}
