<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summer Challenge - English Quest</title>
    <style>
        /* Base Styles */
        body, html { 
            margin: 0; padding: 0; height: 100%; overflow: hidden; 
            background-image: url('background.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }
        
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000; z-index: 20000;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            transition: opacity 1s ease;
        }
        .enter-btn { padding: 20px 50px; font-size: 30px; cursor: pointer; background-color: #2a7ae2; color: white; border: none; border-radius: 50px; }

        /* Sparkles */
        #sparkle-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }
        .sparkle {
            position: absolute; width: 4px; height: 4px;
            background-color: white; border-radius: 50%;
            box-shadow: 0 0 8px 2px rgba(255, 255, 255, 0.6);
            opacity: 0; animation: twinkle infinite linear;
        }
        @keyframes twinkle {
            0% { opacity: 0; transform: translateY(0) scale(0.5); }
            50% { opacity: 0.8; transform: translateY(-20px) scale(1.2); }
            100% { opacity: 0; transform: translateY(-40px) scale(0.5); }
        }

        /* Items */
        .item-container { position: absolute; display: inline-block; z-index: 1; }
        .item-container img { display: block; width: 100%; }
        .text-box { width: 65%; top: 25%; left: 17%; animation: floatIn 1.5s ease-out forwards; }

        /* Isolated Sword Shine */
        .sword-box { width: 45%; top: 36%; right: 22%; opacity: 0; animation: swordFly 1s ease-out 1.5s forwards; }
        .sword-wrapper { position: relative; width: 100%; display: inline-block; }
        .sword-shine {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            /* Mask applied ONLY to this element */
            -webkit-mask-image: url('sword.png'); mask-image: url('sword.png');
            -webkit-mask-size: contain; mask-size: contain;
            -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat;
            /* Sharp Slither Gradient */
            background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.8) 50%, transparent 60%);
            background-size: 200% 100%;
            animation: shine-animation 4s infinite linear;
        }
        @keyframes shine-animation { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* UI Elements */
        .btn {
            position: absolute; left: 50%; transform: translateX(-50%);
            padding: 15px 40px; font-size: 24px; font-family: sans-serif;
            border: none; border-radius: 25px; cursor: pointer; color: white;
            font-weight: 500; transition: transform 0.2s ease; z-index: 10;
        }
        .start-btn { top: 70%; background-color: #2a7ae2; display: none; }
        .rules-btn { top: 82%; background-color: #555; opacity: 0; animation: fadeIn 1s ease-out 1s forwards; }
        .btn:hover { transform: translateX(-50%) scale(1.05); }

        .modal { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); }
        .modal-content {
            margin: 5% auto; width: 80vw; height: 80vh;
            background-image: url('book.png'); background-size: contain;
            background-repeat: no-repeat; background-position: center;
            padding: 50px 120px 80px 120px; box-sizing: border-box;
            color: #333; font-family: sans-serif; overflow-y: auto;
        }
        .close-btn { color: white; font-size: 50px; cursor: pointer; position: absolute; top: 20px; right: 40px; }

        @keyframes floatIn { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes swordFly { from { opacity: 0; transform: translate(400px, -400px) rotate(45deg); } to { opacity: 1; transform: translate(0, 0) rotate(-20deg); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="splash-screen">
        <button class="enter-btn" onclick="enterSite()">ENTER</button>
    </div>

    <div id="sparkle-container"></div>
    
    <div class="item-container text-box"><img src="text.png" alt="Title"></div>
    
    <div class="item-container sword-box">
        <div class="sword-wrapper">
            <img src="sword.png" alt="Sword">
            <div class="sword-shine"></div>
        </div>
    </div>

    <button class="btn start-btn" onclick="startExperience()">START</button>
    <button class="btn rules-btn" onclick="openRules()">RULES</button>

    <div id="rules-modal" class="modal">
        <span class="close-btn" onclick="closeRules()">&times;</span>
        <div class="modal-content">
            <h1>Rules</h1>
            <ul>
                <li>A new quest will be available every week.</li>
                <li>Collect the words after each quest and keep a memo of them!</li>
                <li>You will need the words for the final quest.</li>
                <li>If you complete the summer quest, you can get stamps and be entered in a prize draw!</li>
                <li>Have fun and good luck!</li>
            </ul>
        </div>
    </div>

    <audio id="bg-music" loop><source src="kaisen.mp3" type="audio/mpeg"></audio>

    <script>
        // Generate Sparkles
        const container = document.getElementById('sparkle-container');
        for(let i = 0; i < 40; i++) {
            let s = document.createElement('div');
            s.className = 'sparkle';
            s.style.left = Math.random() * 100 + 'vw';
            s.style.top = Math.random() * 100 + 'vh';
            s.style.animationDuration = (Math.random() * 3 + 4) + 's';
            s.style.animationDelay = Math.random() * 5 + 's';
            container.appendChild(s);
        }

        function enterSite() {
            var splash = document.getElementById('splash-screen');
            splash.style.opacity = '0';
            setTimeout(() => { splash.style.display = 'none'; }, 1000);
            document.getElementById('bg-music').play();
        }

        function openRules() { 
            document.getElementById("rules-modal").style.display = "block";
            document.querySelector(".start-btn").style.display = "block";
        }
        
        function closeRules() { document.getElementById("rules-modal").style.display = "none"; }

        function startExperience() {
            var iframe = document.createElement("iframe");
            iframe.id = "tour-embeded";
            iframe.src = "https://tour.panoee.net/iframe/6a59cd8d10863f0008ada757";
            iframe.style.cssText = "position:fixed; top:0; left:0; width:100vw; height:100vh; border:none; z-index:9999;";
            iframe.setAttribute("allow", "vr; xr; accelerometer; gyroscope; autoplay;");
            iframe.setAttribute("allowFullScreen", "true");
            document.body.appendChild(iframe);
        }
    </script>
</body>
</html>
