<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #000; }
        
        .background { 
            position: fixed; width: 100%; height: 100%; object-fit: cover; z-index: -1; 
        }

        .item-container {
            position: absolute;
            display: inline-block;
        }

        .item-container img {
            display: block;
            width: 100%;
        }

        /* The shine layer - constrained by the SVG mask below */
        .shine-beam {
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
            animation: shineMove 3s infinite linear;
            pointer-events: none;
        }

        .text-box { width: 65%; top: 25%; left: 17%; animation: floatIn 1.5s ease-out forwards; }
        
        .sword-box { 
            width: 45%; top: 36%; right: 22%; 
            opacity: 0; 
            animation: swordFly 1s ease-out 1.5s forwards; 
        }

        @keyframes floatIn { 
            from { opacity: 0; transform: translateY(50px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        @keyframes swordFly { 
            from { opacity: 0; transform: translate(400px, -400px) rotate(45deg); } 
            to { opacity: 1; transform: translate(0, 0) rotate(-20deg); } 
        }
        
        @keyframes shineMove { 
            from { left: -100%; }
            to { left: 100%; } 
        }
    </style>
</head>
<body>
    <img src="background.png" class="background" alt="Background">

    <!-- Text with SVG Mask -->
    <div class="item-container text-box">
        <img src="text.png" alt="Title Text">
        <svg style="position:absolute; top:0; left:0; width:0; height:0;">
            <defs>
                <mask id="text-mask">
                    <image href="text.png" width="100%" height="100%" />
                </mask>
            </defs>
        </svg>
        <div class="shine-beam" style="mask: url(#text-mask); -webkit-mask: url(#text-mask);"></div>
    </div>

    <!-- Sword with SVG Mask -->
    <div class="item-container sword-box">
        <img src="sword.png" alt="Sword">
        <svg style="position:absolute; top:0; left:0; width:0; height:0;">
            <defs>
                <mask id="sword-mask">
                    <image href="sword.png" width="100%" height="100%" />
                </mask>
            </defs>
        </svg>
        <div class="shine-beam" style="mask: url(#sword-mask); -webkit-mask: url(#sword-mask);"></div>
    </div>
</body>
</html>
