<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summer Challenge - English Quest</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #000; }
        
        .background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }

        .item-container { position: absolute; display: inline-block; }
        .item-container img { display: block; width: 100%; }

        .text-box { width: 65%; top: 25%; left: 17%; animation: floatIn 1.5s ease-out forwards; }
        .sword-box { width: 45%; top: 36%; right: 22%; opacity: 0; animation: swordFly 1s ease-out 1.5s forwards; }

        .btn {
            position: absolute; left: 50%; transform: translateX(-50%);
            padding: 15px 40px; font-size: 24px; font-family: sans-serif;
            border: none; border-radius: 25px; cursor: pointer; color: white;
            font-weight: 500; opacity: 0; animation: fadeIn 1s ease-out 2.5s forwards;
            transition: transform 0.2s ease; z-index: 10;
        }
        .start-btn { top: 70%; background-color: #2a7ae2; }
        .rules-btn { top: 82%; background-color: #555; }
        .btn:hover { transform: translateX(-50%) scale(1.05); }

        /* Modal Styles */
        .modal {
            display: none; position: fixed; z-index: 10000;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.9);
        }
        
        /* The "Book" Styling */
        .modal-content {
    margin: 5% auto;
    width: 80vw;
    height: 80vh;
    background-image: url('book.png');
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    padding: 20px 140px 100px 120px;
    box-sizing: border-box;
    color: #333;
    font-family: 'Segoe UI', sans-serif;
    overflow-y: auto;
}

        .close-btn {
            color: white; font-size: 50px; cursor: pointer; 
            position: absolute; top: 20px; right: 40px;
        }

        @keyframes floatIn { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes swordFly { from { opacity: 0; transform: translate(400px, -400px) rotate(45deg); } to { opacity: 1; transform: translate(0, 0) rotate(-20deg); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <img src="background.png" class="background" alt="Background">
    <div class="item-container text-box"><img src="text.png" alt="Title"></div>
    <div class="item-container sword-box"><img src="sword.png" alt="Sword"></div>

    <button class="btn start-btn" onclick="startExperience()">START</button>
    <button class="btn rules-btn" onclick="openRules()">RULES</button>

    <div id="rules-modal" class="modal">
        <span class="close-btn" onclick="closeRules()">&times;</span>
        <div class="modal-content">
            <h1>Game Rules</h1>
            <p>Welcome to the English Quest!</p>
            <ul>
                <li>Explore the map to find hidden items.</li>
                <li>Answer the questions correctly to earn points.</li>
                <li>Watch out for time limits!</li>
                <li>Have fun and good luck!</li>
            </ul>
        </div>
    </div>

    <audio id="bg-music" loop><source src="kaisen.mp3" type="audio/mpeg"></audio>

    <script>
        function startExperience() {
            var music = document.getElementById('bg-music');
            music.play().catch(e => console.log("Audio prevented:", e));
            var iframe = document.createElement("iframe");
            iframe.id = "tour-embeded";
            iframe.src = "https://tour.panoee.net/iframe/6a59cd8d10863f0008ada757";
            iframe.style.cssText = "position:fixed; top:0; left:0; width:100vw; height:100vh; border:none; z-index:9999;";
            iframe.setAttribute("allow", "vr; xr; accelerometer; gyroscope; autoplay;");
            iframe.setAttribute("allowFullScreen", "true");
            document.body.appendChild(iframe);
        }
        function openRules() { document.getElementById("rules-modal").style.display = "block"; }
        function closeRules() { document.getElementById("rules-modal").style.display = "none"; }
    </script>
</body>
</html>
