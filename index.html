<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Summer Challenge - English Quest</title>
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; overflow: hidden; 
            background-image: url('background.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        :fullscreen, :-webkit-full-screen {
            width: 100% !important;
            height: 100% !important;
        }

        /* Ensure interactive controls maintain pointer responsiveness */
        .button-group, #music-widget, .modal {
            pointer-events: auto !important;
        }

        /* Update Notes Box Styling with smooth minimize transition */
        .update-notes {
            position: fixed;
            top: 20px;
            right: 20px;
            color: white;
            font-family: sans-serif;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            z-index: 10001;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            pointer-events: auto;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            width: 280px;
            max-height: 250px;
            padding: 12px 18px;
            box-sizing: border-box;
            cursor: pointer;
        }

        /* Minimized State */
        .update-notes.minimized {
            width: 44px;
            height: 44px;
            max-height: 44px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.7);
        }

        .update-notes.minimized .update-body {
            opacity: 0;
            pointer-events: none;
            display: none;
        }

        .update-notes.minimized .update-icon {
            opacity: 1;
            transform: scale(1);
        }

        /* Expanded State Elements */
        .update-body {
            transition: opacity 0.2s ease;
            opacity: 1;
        }

        .update-icon {
            position: absolute;
            font-size: 20px;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.3s ease;
        }

        .update-notes h3 {
            margin: 0 0 6px 0;
            font-size: 15px;
            font-weight: bold;
            letter-spacing: 0.5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .update-notes ul {
            margin: 0;
            padding-left: 16px;
            font-size: 13px;
            line-height: 1.4;
        }

        .update-notes li {
            margin-bottom: 4px;
        }

        /* Combined Splash & Orientation Screen */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000; z-index: 20000;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            transition: opacity 1s ease;
        }
        .splash-content { text-align: center; color: white; font-family: sans-serif; }
        #rotate-msg { display: none; font-size: 24px; }
        #enter-container { display: block; }

        @media screen and (orientation: portrait) {
            /* Title (adjusted for better mobile fit) */
            .text-box { 
                width: 150% !important; 
                top: 15% !important; 
                left: -23% !important; 
            }
            .text-box img { width: 100% !important; }

            /* Sword (adjusted for better mobile fit) */
            .sword-box { 
                width: 90% !important; 
                top: 25% !important; 
                right: -15% !important; 
            }
            .sword-box img { width: 100% !important; }

            /* Orientation Message */
            #rotate-msg { display: block !important; }
            #enter-container { display: none !important; }
            
            .update-notes { display: none; }
        }

        .enter-btn { 
            padding: 20px 50px; font-size: 30px; cursor: pointer; 
            background-color: #2a7ae2; color: white; border: none; border-radius: 50px; 
            margin-top: 20px;
        }

        /* Sparkles */
        #sparkle-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }
        .sparkle {
            position: absolute; width: 4px; height: 4px;
            background-color: white; border-radius: 50%;
            box-shadow: 0 0 8px 2px rgba(255, 255, 255, 0.6);
            opacity: 0; animation: twinkle infinite linear;
        }
        @keyframes twinkle {
            0% { opacity: 0; transform: translateY(0) scale(0.5); }
            50% { opacity: 0.8; transform: translateY(-20px) scale(1.2); }
            100% { opacity: 0; transform: translateY(-40px) scale(0.5); }
        }

        /* Items */
        .item-container { position: absolute; display: inline-block; z-index: 1; }
        .item-container img { display: block; width: 100%; }
        .text-box { width: 60%; top: 15%; left: 20%; animation: floatIn 1.5s ease-out forwards; }

        /* Sword Shine */
        .sword-box { width: 35%; top: 30%; right: 25%; opacity: 0; animation: swordFly 1s ease-out 1.5s forwards; }
        .sword-wrapper { position: relative; width: 100%; display: inline-block; }
        .sword-shine {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            -webkit-mask-image: url('sword.png'); mask-image: url('sword.png');
            -webkit-mask-size: contain; mask-size: contain;
            -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat;
            background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.8) 50%, transparent 60%);
            background-size: 200% 100%;
            animation: shine-animation 7s infinite linear;
        }
        @keyframes shine-animation { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* Panoee Cropping Container */
        .panoee-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden; 
            z-index: 9999;
        }

        .panoee-container iframe {
            position: absolute;
            width: 100%;
            height: 105%;
            top: 0%;
            left: 0%;
            border: none;
        }

        /* Button Layout */
        .button-group {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: row;
            gap: 20px;
            z-index: 10;
        }
        .btn {
            padding: 15px 40px; font-size: 20px; font-family: sans-serif;
            border: none; border-radius: 25px; cursor: pointer; color: white;
            font-weight: 500; transition: transform 0.2s ease;
        }
        .start-btn { 
            background-color: #2a7ae2; 
            visibility: hidden; 
        }
        .start-visible { visibility: visible !important; }
        .rules-btn { background-color: #555; }
        .btn:hover { transform: scale(1.05); }

        /* Modal */
        .modal { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); }
        .modal-content {
            margin: 5% auto; width: 80vw; height: 80vh;
            background-image: url('book.png'); background-size: contain;
            background-repeat: no-repeat; background-position: center;
            padding: 50px 120px 80px 120px; box-sizing: border-box;
            color: #333; font-family: sans-serif; overflow-y: auto;
        }
        .close-btn { color: white; font-size: 50px; cursor: pointer; position: absolute; top: 20px; right: 40px; z-index: 10001; }

        @keyframes floatIn { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes swordFly { from { opacity: 0; transform: translate(400px, -400px) rotate(45deg); } to { opacity: 1; transform: translate(0, 0) rotate(-20deg); } }

        #music-widget {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 16px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 10000;
            color: white;
            font-family: sans-serif;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .controls-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .music-btn {
            background: none;
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease, opacity 0.2s ease;
            line-height: 1;
        }
        .music-btn:hover { transform: scale(1.15); opacity: 0.8; }

        #track-title {
            font-size: 14px;
            white-space: nowrap;
            line-height: 1;
        }
    </style>
</head>
<body>

    <!-- Update Notes Box with toggle capability -->
    <div id="update-box" class="update-notes" onclick="toggleUpdateNotes(event)" title="Click to expand update notes">
        <div class="update-icon">✨</div>
        <div class="update-body">
            <h3>✨ What's New <span style="font-size: 11px; font-weight: normal; opacity: 0.7;">_</span></h3>
            <ul>
                <li>Added new background music tracks!</li>
                <li>Improved mobile layout & controls.</li>
                <li>General bug fixes and performance updates.</li>
            </ul>
        </div>
    </div>

    <div id="splash-screen">
        <div class="splash-content">
            <div id="rotate-msg"><h1>端末を横向きにしてください</h1></div>
            <div id="enter-container">
               <button class="enter-btn" onclick="enterSite()">ENTER</button>
            </div>
        </div>
    </div>

    <div id="sparkle-container"></div>
    <div class="item-container text-box"><img src="text.png" alt="Title"></div>
    <div class="item-container sword-box">
        <div class="sword-wrapper">
            <img src="sword.png" alt="Sword">
            <div class="sword-shine"></div>
        </div>
    </div>

    <div class="button-group">
        <button class="btn start-btn" onclick="startExperience()">START</button>
        <button class="btn rules-btn" onclick="openRules()">RULES</button>
    </div>

    <div id="music-widget">
        <span id="track-title">Track 1</span>
        <div class="controls-group">
            <button class="music-btn" onclick="prevTrack()" title="Previous">⏮</button>
            <button class="music-btn" id="play-pause-btn" onclick="togglePlayPause()" title="Play/Pause">❚❚</button>
            <button class="music-btn" onclick="nextTrack()" title="Next">⏭</button>
        </div>
    </div>

    <audio id="bg-music"></audio>

    <div id="rules-modal" class="modal">
        <span class="close-btn" onclick="closeRules()">&times;</span>
        <div class="modal-content">
            <!-- Text removed here -->
        </div>
    </div>

    <script>
        const container = document.getElementById('sparkle-container');
        for(let i = 0; i < 40; i++) {
            let s = document.createElement('div');
            s.className = 'sparkle';
            s.style.left = Math.random() * 100 + 'vw';
            s.style.top = Math.random() * 100 + 'vh';
            s.style.animationDuration = (Math.random() * 3 + 4) + 's';
            s.style.animationDelay = Math.random() * 5 + 's';
            container.appendChild(s);
        }

        // --- Auto-Minimize Update Notes after 5 seconds ---
        let manualToggle = false;
        setTimeout(() => {
            const updateBox = document.getElementById('update-box');
            if (!manualToggle && updateBox && !updateBox.classList.contains('minimized')) {
                updateBox.classList.add('minimized');
            }
        }, 5000); // 5000 milliseconds = 5 seconds

        function toggleUpdateNotes(event) {
            manualToggle = true; // User interacted, stop auto-behavior conflicts
            const updateBox = document.getElementById('update-box');
            updateBox.classList.toggle('minimized');
        }

        // --- Playlist Configuration ---
        const playlist = [
            { name: "1.Adventure", src: "music/kaisen.mp3" },
            { name: "2.Summer", src: "music/natsuyasuminotanken.mp3" }, 
            { name: "3.Rain", src: "music/solarisnoame.mp3" }, 
            { name: "4.Lunar", src: "music/gesshokunomirage.mp3" }, 
            { name: "5.Kingdom", src: "music/icarusnotsuiraku.mp3" },
            { name: "6.Tomorrow", src: "music/ashitaetudukusora.mp3" }, 
            { name: "7.Snow", src: "music/hatsuyuki.mp3" },
            { name: "8.Onward", src: "music/zangyousenshi.mp3" }, 
            { name: "9.Evening", src: "music/houkagonoumibe.mp3" }, 
            { name: "10.Boss", src: "music/gameover.mp3" }, 
            { name: "11.Always", src: "music/suisounishizumutsuki.mp3" },
            { name: "12.Cosmos", src: "music/houkagonoyuzora.mp3" }, 
            { name: "13.Journey", src: "music/umioiku.mp3" },
            { name: "14.End", src: "music/kouyaoiku.mp3" }, 
            { name: "15.March", src: "music/funenotabi.mp3" }, 
            { name: "16.Endless", src: "music/hateshinaimichi.mp3" }, 
            { name: "17.Mystery", src: "music/tsukitowatashi_violin.mp3" }
        ];
        let currentTrackIndex = 0;
        const bgMusic = document.getElementById('bg-music');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const trackTitleDisplay = document.getElementById('track-title');

        function playCurrentTrack() {
            bgMusic.src = playlist[currentTrackIndex].src;
            trackTitleDisplay.textContent = playlist[currentTrackIndex].name;
            bgMusic.play().then(() => {
                playPauseBtn.textContent = "❚❚"; 
            }).catch(e => console.log("Audio play blocked or waiting for interaction"));
        }

        bgMusic.addEventListener('ended', () => {
            currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
            playCurrentTrack();
        });

        // Widget Controls
        function togglePlayPause() {
            if (bgMusic.paused) {
                if (!bgMusic.src) {
                    playCurrentTrack();
                } else {
                    bgMusic.play();
                }
                playPauseBtn.textContent = "❚❚";
            } else {
                bgMusic.pause();
                playPauseBtn.textContent = "▶"; 
            }
        }

        function nextTrack() {
            currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
            playCurrentTrack();
        }

        function prevTrack() {
            currentTrackIndex = (currentTrackIndex - 1 + playlist.length) % playlist.length;
            playCurrentTrack();
        }

        function enterSite() {
            var splash = document.getElementById('splash-screen');
            splash.style.opacity = '0';
            setTimeout(() => { splash.style.display = 'none'; }, 1000);
            
            requestFullscreen();
            playCurrentTrack();
        }

        function openRules() { 
            document.getElementById("rules-modal").style.display = "block";
            document.querySelector(".start-btn").classList.add("start-visible");
        }
        function closeRules() { document.getElementById("rules-modal").style.display = "none"; }

        function startExperience() {
            var wrapper = document.createElement("div");
            wrapper.className = "panoee-container";

            var iframe = document.createElement("iframe");
            iframe.src = "https://tour.panoee.net/iframe/6a59cd8d10863f0008ada757";
            iframe.setAttribute("allow", "vr; xr; accelerometer; gyroscope; autoplay;");
            iframe.setAttribute("allowFullScreen", "true");
            
            wrapper.appendChild(iframe);
            document.body.appendChild(wrapper);
        }

        function requestFullscreen() {
            var elem = document.documentElement;
            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            } else if (elem.webkitRequestFullscreen) { /* Safari/iOS fallback */
                elem.webkitRequestFullscreen();
            }
        }

        let wasPlayingBeforeGame = false;

        document.addEventListener("visibilitychange", () => {
            if (document.hidden) {
                if (bgMusic && !bgMusic.paused) {
                    wasPlayingBeforeGame = true; 
                    bgMusic.pause();           
                    playPauseBtn.textContent = "▶"; 
                }
            } else {
                if (bgMusic && wasPlayingBeforeGame) {
                    bgMusic.play().then(() => {
                        playPauseBtn.textContent = "❚❚";
                    }).catch(e => console.log("Auto-resume blocked"));
                    
                    wasPlayingBeforeGame = false; 
                }
            }
        });
    </script>
</body>
</html>
