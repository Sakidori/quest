<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>サイト構築中</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
            text-align: center;
            background-color: #f4f4f9;
        }
        h1 { margin-bottom: 20px; color: #333; }
        #countdown {
            font-size: 1.5rem;
            font-weight: bold;
            color: #555;
        }
    </style>
</head>
<body>

    <h1>現在、サイトを構築中です。<br>7月22日までに公開予定です。</h1>
    <div id="countdown">読み込み中...</div>

    <script>
        // Set the target date: July 21, 2026
        const targetDate = new Date("2026-07-22T00:00:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                document.getElementById("countdown").innerHTML = "公開準備が整いました！";
                return;
            }

            const d = Math.floor(distance / (1000 * 60 * 60 * 24));
            const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("countdown").innerHTML = 
                d + "日 " + h + "時間 " + m + "分 " + s + "秒";
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
